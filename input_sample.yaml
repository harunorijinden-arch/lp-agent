# ========================================
# LP制作エージェント — 入力設定ファイル
# ========================================
# このファイルをコピーして、自分の案件用に編集してください。
#
# 使い方:
#   uv run python main.py --config input.yaml --step 1         # Step 1 実行
#   uv run python main.py --config input.yaml --step 2 --project-dir output/xxx  # Step 2 実行
#   uv run python main.py --revise 1 --feedback "ここ変えて" --project-dir output/xxx  # 修正

# ── LP目的（必須）──
# LPを見た人に最終的にどうなってほしいか？
lp_purpose: "無料相談に申し込んでもらう"

# ── 基本情報（必須）──
industry: "美容"
product: "美容液"

# ── リサーチ用LP（必須）──
# 競合LP: このLPを起点に同業界をリサーチします
competitor_url: "https://example.com/competitor-lp"

# 別業界LP: このLPを起点に異業界をリサーチします
cross_industry_url: "https://example.com/other-industry-lp"

# ── ターゲット情報（必須）──
# お客さんのことを自由に書いてください
# どんな人？何に悩んでる？どうなりたい？思い込みは？
who: |
  35歳女性のマーケ担当。集客が伸びなくて焦ってる。
  本当は「このままだと居場所がなくなる」って怖い。
  LPは綺麗にデザインしないと売れないと思い込んでる。
  安定してリードが入って、自信持って仕事したいと思ってる。

# ── 提供価値（必須）──
# あなたの商品・サービスの強みを自由に書いてください
# 一番の売りは？使うとどんな気持ちに？競合との違いは？
what: |
  AIが自動でLP構成を設計。専門知識なしでプロ品質のLPが作れる。
  「もうLPで悩まなくていい」という安心感。
  業界唯一のAI×コピーライティング統合。

# ── Meta広告情報（任意）──
# 勝ちパターンのクリエイティブ、広告文、訴求軸など
# なければこの項目ごと削除してOK
meta_ad_info: |
  悩み共感型のクリエイティブがCTR高い。
  「○○で悩んでいませんか？」系の広告文が効いている。
  Before/After系のビジュアルも反応良い。
